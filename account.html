<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMDS - Account & Security</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging-compat.js"></script>

    <style>
        :root {
            --primary: #16a34a; 
            --gold: #d4af37;    
            --sidebar-bg: #fef3c7; 
            --app-bg: #dcfce7;  
            --text-main: #000000;
            --text-gray: #6b7280;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--app-bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
        }

        /* --- Profile Header --- */
        .profile-header {
            background-color: var(--primary);
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .avatar-selection {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border: 4px solid var(--gold);
            border-radius: 50%;
            background: #fff;
            padding: 5px;
        }
        #current-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .gender-pick { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .gender-btn {
            background: var(--sidebar-bg); border: 1px solid var(--gold);
            padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer;
        }

        /* --- Auth Card --- */
        .auth-card {
            background: #fff; margin: -30px 20px 20px;
            border-radius: 25px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--gold);
        }

        .auth-card h3 { margin-top: 0; text-align: center; color: var(--primary); }
        .input-box {
            width: 100%; padding: 15px; margin-bottom: 12px;
            border-radius: 12px; border: 1.5px solid #eee; outline: none;
            box-sizing: border-box; font-family: inherit;
        }

        .btn-main {
            width: 100%; padding: 15px; border-radius: 12px;
            border: none; background: var(--primary); color: #fff;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        .btn-google {
            width: 100%; padding: 12px; margin-top: 10px;
            border-radius: 12px; border: 1.5px solid #eee;
            background: #fff; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 600; cursor: pointer;
        }

        /* --- User Stats --- */
        .user-panel { display: none; padding: 0 20px; }
        .info-item {
            background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px; border: 1px solid #eee;
        }
        .info-item i { color: var(--primary); width: 20px; text-align: center; }
        
        .whatsapp-support {
            position: fixed; bottom: 100px; right: 20px;
            background: #25D366; color: white; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 999;
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-link { text-align: center; text-decoration: none; color: var(--text-gray); font-weight: 800; font-size: 10px; flex: 1; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 24px; display: block; margin-bottom: 4px; }
        
        .btn-logout { background: #ef4444; color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <a href="https://wa.me/916297474412" class="whatsapp-support"><i class="fab fa-whatsapp"></i></a>

    <div class="profile-header">
        <div class="avatar-selection">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="current-avatar">
        </div>
        <div class="gender-pick" id="gender-selectors">
            <div class="gender-btn" onclick="setAvatar('male')">MALE</div>
            <div class="gender-btn" onclick="setAvatar('female')">FEMALE</div>
        </div>
        <h2 id="display-user-name" style="color: white; margin: 10px 0 0;">Welcome Guest</h2>
        <small id="user-location" style="color: var(--sidebar-bg); font-weight: bold;"><i class="fas fa-map-marker-alt"></i> Finding location...</small>
    </div>

    <div class="auth-card" id="login-section">
        <h3 style="color: var(--primary); text-align: center; margin-bottom: 20px;">
            <i class="fas fa-user-shield"></i> Secure Access
        </h3>
        
        <input type="tel" id="userPhone" class="input-box" placeholder="Phone Number (e.g. 91...)">

        <div id="otp-area" style="display: none; margin-top: 15px;">
            <input type="number" id="otpCode" class="input-box" placeholder="Enter 6-Digit Code">
            <button class="btn-main" style="background: var(--gold);" onclick="verifyOTP()">VERIFY & LOGIN</button>
            <p style="font-size: 11px; text-align: center; margin-top: 10px; color: var(--text-gray);">
                OTP not received? <span onclick="togglePassLogin()" style="color: var(--primary); font-weight: 800; cursor: pointer;">Use Master Password</span>
            </p>
        </div>

        <div id="pass-area" style="display: none; margin-top: 15px;">
            <input type="password" id="masterPass" class="input-box" placeholder="Enter Secret Password">
            <button class="btn-main" onclick="loginWithMasterPass()">LOGIN WITH PASSWORD</button>
            <p onclick="showLoginOptions('otp')" style="font-size: 11px; text-align: center; margin-top: 10px; color: var(--primary); font-weight: bold; cursor: pointer;">
                Back to OTP Method
            </p>
        </div>

        <div id="initial-auth-btns" style="margin-top: 15px;">
            <button class="btn-main" onclick="sendOTPRequest()">SEND OTP CODE</button>
            <button class="btn-google" style="margin-top: 12px; border: 1.5px solid var(--gold);" onclick="togglePassLogin()">
                <i class="fas fa-key" style="color: var(--gold);"></i> Login with Password
            </button>
        </div>

        <div style="text-align: center; margin: 20px 0; color: #ccc; font-size: 12px;">OR</div>
        
        <button class="btn-google" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="20"> Continue with Google
        </button>
    </div>

    <div class="user-panel" id="profile-section">
        <div class="info-item">
            <i class="fas fa-phone"></i>
            <div><small style="color:gray">Verified Phone</small><br><b id="profile-phone">Not Set</b></div>
        </div>

        <div class="info-item" onclick="location.href='orders.html'" style="cursor:pointer; border: 1.5px solid var(--gold);">
            <i class="fas fa-receipt" style="font-size: 20px;"></i>
            <div style="flex-grow: 1;">
                <b style="font-size: 14px;">My Order History</b><br>
                <small style="color:gray">Track current & past orders</small>
            </div>
            <i class="fas fa-chevron-right" style="color: var(--gold); font-size: 12px;"></i>
        </div>

        <a href="rules.html" class="info-item" style="text-decoration: none; color: inherit;">
            <i class="fas fa-file-contract"></i>
            <div><b style="font-size: 14px;">Terms & Conditions</b><br><small style="color:gray">GMDS rules and safety</small></div>
            <i class="fas fa-chevron-right" style="margin-left: auto; color: #ccc; font-size: 12px;"></i>
        </a>
        
        <button class="btn-logout" onclick="logout()">LOGOUT FROM DEVICE</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-house"></i>HOME</a>
        <a href="cart.html" class="nav-link"><i class="fas fa-shopping-basket"></i>CART</a>
        <a href="account.html" class="nav-link active"><i class="fas fa-user-circle"></i>ACCOUNT</a>
    </nav>

<script>
// --- Firebase Config ---
const firebaseConfig = {
    apiKey: "AIzaSyB58FuXUOzOnTuGU-PRR-V5c6f1e3a5ce1da",
    authDomain: "gmds-super-app.firebaseapp.com",
    databaseURL: "https://gmds-super-app-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gmds-super-app",
    storageBucket: "gmds-super-app.appspot.com",
    messagingSenderId: "872768042776",
    appId: "1:872768042776:web:5c64e3a6ce4da6229faa8",
    measurementId: "G-MWX8QCMNNH"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const messaging = firebase.messaging();

// --- UI Toggle Functions ---
function togglePassLogin() {
    document.getElementById('initial-auth-btns').style.display = 'none';
    document.getElementById('otp-area').style.display = 'none';
    document.getElementById('pass-area').style.display = 'block';
}

function showLoginOptions(type) {
    if(type === 'otp') {
        document.getElementById('pass-area').style.display = 'none';
        document.getElementById('initial-auth-btns').style.display = 'block';
    }
}

// --- GPS Tracking ---
function trackUserLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            localStorage.setItem('userLat', latitude);
            localStorage.setItem('userLon', longitude);
            document.getElementById('user-location').innerHTML = `<i class="fas fa-check-circle"></i> Location Verified`;
            
            const phone = localStorage.getItem('userPhone');
            if(phone) db.ref('users/' + phone).update({ lat: latitude, lon: longitude });
        });
    }
}

// --- ✅ GMDS Push Notification Engine ---
function initGMDSPush() {
    Notification.requestPermission().then((permission) => {
        if (permission === 'granted') {
            messaging.getToken({ 
                vapidKey: 'YOUR_PUBLIC_VAPID_KEY_FROM_FIREBASE' 
            }).then((currentToken) => {
                if (currentToken) {
                    const phone = localStorage.getItem('userPhone');
                    if (phone) {
                        db.ref('fcm_tokens/' + phone).set({
                            token: currentToken,
                            updatedAt: new Date().getTime(),
                            status: "active"
                        });
                    }
                }
            });
        }
    });
}

// ✅ Handle Incoming Live Notifications
messaging.onMessage((payload) => {
    new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3').play();
    alert("🔔 " + payload.notification.title + "\n" + payload.notification.body);
});

// ✅ Master Password Verification Logic
function loginWithMasterPass() {
    const phone = document.getElementById('userPhone').value;
    const inputPass = document.getElementById('masterPass').value;

    if(!phone || !inputPass) return alert("Please enter both phone and password!");

    db.ref('users/' + phone).once('value', snap => {
        const userData = snap.val();
        if(userData && userData.masterPassword === inputPass) {
            alert("Security Verified! Access Granted.");
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userPhone', phone);
            localStorage.setItem('userAvatar', userData.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png');
            location.reload();
        } else {
            alert("Error: Incorrect password or unauthorized phone number.");
        }
    });
}

// --- Auth & OTP Functions ---
function sendOTPRequest() {
    const phone = document.getElementById('userPhone').value;
    if(!phone) return alert("Please enter your phone number!");
    document.getElementById('initial-auth-btns').style.display = 'none';
    document.getElementById('otp-area').style.display = 'block';
}

function verifyOTP() {
    const phone = document.getElementById('userPhone').value;
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userPhone', phone);
    location.reload();
}

function googleLogin() {
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userPhone', 'Google User');
    location.reload();
}

function setAvatar(gender) {
    const img = (gender === 'male') ? 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png' : 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png';
    document.getElementById('current-avatar').src = img;
    localStorage.setItem('userAvatar', img);
}

function logout() { localStorage.clear(); location.reload(); }

window.onload = () => {
    trackUserLocation();
    if(localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('gender-selectors').style.display = 'none';
        document.getElementById('profile-section').style.display = 'block';
        document.getElementById('display-user-name').innerText = "Hello, Member";
        document.getElementById('profile-phone').innerText = localStorage.getItem('userPhone');
        const savedAvatar = localStorage.getItem('userAvatar');
        if(savedAvatar) document.getElementById('current-avatar').src = savedAvatar;
        initGMDSPush();
    }
};
</script>
</body>
</html>
