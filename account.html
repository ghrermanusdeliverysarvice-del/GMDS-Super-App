<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMDS - Account & Security</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #16a34a; 
            --gold: #d4af37;    
            --sidebar-bg: #fef3c7; 
            --app-bg: #dcfce7;  
            --text-main: #000000;
            --text-gray: #6b7280;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--app-bg);
            margin: 0;
            padding-bottom: 90px;
        }

        /* --- Profile Header --- */
        .profile-header {
            background-color: var(--primary);
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .avatar-selection {
            position: relative; width: 110px; height: 110px;
            margin: 0 auto 15px; border: 4px solid var(--gold);
            border-radius: 50%; background: #fff; padding: 3px;
        }
        #current-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .gender-pick { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .gender-btn { background: var(--sidebar-bg); border: 1px solid var(--gold); padding: 6px 18px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .gender-btn:active { background: var(--gold); color: white; }

        /* --- Auth Card --- */
        .auth-card {
            background: #fff; margin: -30px 20px 20px;
            border-radius: 25px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .input-box { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1.5px solid #eee; outline: none; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        .input-box:focus { border-color: var(--primary); }

        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-google { width: 100%; padding: 12px; margin-top: 12px; border-radius: 12px; border: 1.5px solid #eee; background: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; cursor: pointer; }

        /* --- User Stats --- */
        .user-panel { display: none; padding: 0 20px; }
        .info-item { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; }
        .info-item i { color: var(--primary); font-size: 20px; width: 25px; text-align: center; }
        
        .btn-logout { background: #ef4444; color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; font-weight: 800; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; text-decoration: none; color: var(--text-gray); font-weight: 800; font-size: 10px; flex: 1; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar-selection">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="current-avatar">
        </div>
        <div class="gender-pick" id="gender-selectors">
            <div class="gender-btn" onclick="setAvatar('male')">3D MALE</div>
            <div class="gender-btn" onclick="setAvatar('female')">3D FEMALE</div>
        </div>
        <h2 id="display-user-name" style="color: white; margin: 10px 0 0; font-size: 20px;">Guest Access</h2>
        <p id="auth-status-text" style="color: #dcfce7; font-size: 11px; margin: 5px 0 0; font-weight: 600;">Secure Connection Active</p>
    </div>

    <div class="auth-card" id="login-section">
        <h3 style="margin-top: 0; color: var(--primary); text-align: center;">Secure Member Access</h3>
        <div id="recaptcha-container"></div>

        <input type="tel" id="userPhone" class="input-box" placeholder="10-Digit Mobile Number">

        <div id="otp-area" style="display: none;">
            <input type="number" id="otpCode" class="input-box" placeholder="6-Digit OTP Code">
            <button class="btn-main" style="background: var(--gold);" onclick="verifyOTP()">VERIFY & PROCEED</button>
        </div>

        <div id="pass-area" style="display: none;">
            <input type="password" id="masterPass" class="input-box" placeholder="Master Password">
            <button class="btn-main" onclick="loginWithMasterPass()">LOGIN WITH PASSWORD</button>
        </div>

        <div id="initial-btns">
            <button class="btn-main" onclick="sendOTPRequest()">GET OTP CODE</button>
            <button class="btn-google" style="border: 1px solid var(--gold); color: var(--gold);" onclick="toggleAuthMode('pass')">
                <i class="fas fa-lock-open"></i> Use Master Password
            </button>
        </div>

        <div style="text-align: center; margin: 20px 0; color: #ccc; font-size: 11px;">EXTERNAL LOGINS</div>
        
        <button class="btn-google" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="20"> Continue with Google
        </button>
    </div>

    <div class="user-panel" id="profile-section">
        <div class="info-item">
            <i class="fas fa-id-card"></i>
            <div><small style="color:gray">Identity</small><br><b id="profile-phone">Loading...</b></div>
        </div>

        <div class="info-item" onclick="location.href='orders.html'" style="cursor:pointer; border: 1.5px solid var(--gold);">
            <i class="fas fa-bag-shopping"></i>
            <div style="flex-grow: 1;"><b>My Order History</b><br><small>Track your active requests</small></div>
            <i class="fas fa-chevron-right" style="color: var(--gold);"></i>
        </div>

        <button class="btn-logout" onclick="logout()">LOGOUT FROM GMDS</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-house"></i>HOME</a>
        <a href="cart.html" class="nav-link"><i class="fas fa-basket-shopping"></i>CART</a>
        <a href="account.html" class="nav-link active"><i class="fas fa-circle-user"></i>ACCOUNT</a>
    </nav>

<script>
// --- Unified Firebase Config (Singapore) ---
const firebaseConfig = {
    apiKey: "AIzaSyB58FuXUOzOnTuGU-PRR-V5c6f1e3a5ce1da",
    authDomain: "gmds-super-app.firebaseapp.com",
    databaseURL: "https://gmds-super-app-default-rtdb.asia-southeast1.firebasedatabase.app/", 
    projectId: "gmds-super-app",
    storageBucket: "gmds-super-app.appspot.com",
    messagingSenderId: "872768042776",
    appId: "1:872768042776:web:5c64e3a6ce4da6229faa8"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();
const db = firebase.database();

// --- Core Auth Logic ---

// 1. Send OTP (With Auto +91 Handler)
function sendOTPRequest() {
    let rawPhone = document.getElementById('userPhone').value.trim();
    if(rawPhone.length < 10) return alert("Please enter a valid 10-digit number.");
    
    // Auto-detect and fix Country Code
    let finalPhone = rawPhone.startsWith('+') ? rawPhone : "+91" + rawPhone;

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

    auth.signInWithPhoneNumber(finalPhone, window.recaptchaVerifier)
        .then(result => {
            window.confirmationResult = result;
            document.getElementById('initial-btns').style.display = 'none';
            document.getElementById('otp-area').style.display = 'block';
            alert("OTP Sent to " + finalPhone);
        }).catch(err => {
            alert("Error: " + err.message);
            location.reload();
        });
}

// 2. Google Provider Login
function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then((result) => {
        saveUserToLocal(result.user.email, result.user.photoURL, result.user.displayName);
    }).catch(err => alert("Google Login Failed: " + err.message));
}

// 3. Master Password Logic
function loginWithMasterPass() {
    const phone = document.getElementById('userPhone').value;
    const pass = document.getElementById('masterPass').value;

    if(!phone || !pass) return alert("Phone and Password required!");

    db.ref('users/' + phone).once('value', snap => {
        const data = snap.val();
        if(data && data.masterPassword === pass) {
            saveUserToLocal(phone, data.avatar, "Member");
        } else {
            alert("Unauthorized Access Attempt!");
        }
    });
}

// 4. Verification & UI Helper
function verifyOTP() {
    const code = document.getElementById('otpCode').value;
    window.confirmationResult.confirm(code).then((result) => {
        saveUserToLocal(result.user.phoneNumber, null, "Verified Member");
    }).catch(() => alert("Wrong OTP Code!"));
}

function saveUserToLocal(id, avatar, name) {
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userPhone', id);
    if(avatar) localStorage.setItem('userAvatar', avatar);
    location.reload();
}

function toggleAuthMode(mode) {
    document.getElementById('initial-btns').style.display = 'none';
    if(mode === 'pass') document.getElementById('pass-area').style.display = 'block';
}

function setAvatar(gender) {
    const img = (gender === 'male') ? 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png' : 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png';
    document.getElementById('current-avatar').src = img;
    localStorage.setItem('userAvatar', img);
}

function logout() { auth.signOut().then(() => { localStorage.clear(); location.reload(); }); }

window.onload = () => {
    if(localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('gender-selectors').style.display = 'none';
        document.getElementById('profile-section').style.display = 'block';
        document.getElementById('display-user-name').innerText = "Verified Dashboard";
        document.getElementById('profile-phone').innerText = localStorage.getItem('userPhone');
        
        const savedImg = localStorage.getItem('userAvatar');
        if(savedImg) document.getElementById('current-avatar').src = savedImg;
    }
};
</script>
</body>
</html>
